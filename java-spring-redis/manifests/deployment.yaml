apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-spring-redis
  labels:
    app.kubernetes.io/name: java-spring-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: java-spring-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: java-spring-redis
    spec:
      containers:
        - name: app
          image: REPLACE_ME_IMAGE
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: java-spring-redis-secrets
                  key: REDIS_URL
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
